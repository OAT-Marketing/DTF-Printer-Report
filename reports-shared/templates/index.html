<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SEO Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../reports-shared/assets/style.css">
<style>
  :root { --orange:#F28C28; --black:#1A1A1A; --text:#2B2B2B; --muted:#777; --line:#D9D9D9; --soft:#F7F7F7; }
  html,body{width:100%;height:100%;margin:0;overflow:hidden}
  body{font-family:"Work Sans",Arial,sans-serif;background:#fff;color:var(--text);padding:0}
  .page{width:100vw;height:100vh;padding:32px;display:flex;justify-content:center}
  .cover{width:70vw;height:100%;border:1px solid var(--line);border-radius:10px;padding:46px 56px;display:grid;grid-template-rows:auto 1fr;background:#fff}
  .logo{width:110px;height:auto;display:block;background:var(--black);border-radius:7px;padding:11px 14px}
  .main{min-height:0;display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:56px;align-items:center}
  .eyebrow{margin:0 0 14px;color:var(--orange);font-size:13px;font-weight:800;letter-spacing:3px;text-transform:uppercase}
  h1.cover-h{margin:0;font-family:"Montserrat",sans-serif;font-size:clamp(56px,8vw,104px);line-height:.9;font-weight:900;color:var(--black)}
  .rule{width:110px;height:6px;margin:24px 0 22px;background:var(--orange);border-radius:999px}
  .client{margin:0 0 6px;font-family:"Montserrat",sans-serif;font-size:34px;line-height:1.1;font-weight:800;color:var(--text)}
  .date{margin:0;color:var(--muted);font-size:18px;font-weight:600}
  .index-card{width:100%;max-height:100%;border:1px solid var(--line);border-radius:8px;padding:28px;background:#fff}
  .index-title{margin:0 0 20px;font-family:"Montserrat",sans-serif;font-size:24px;font-weight:800;color:var(--black)}
  .index-list{list-style:none;margin:0;padding:0}
  .index-list li+li{margin-top:10px}
  .index-list a{display:grid;grid-template-columns:30px 1fr 16px;gap:10px;align-items:center;color:var(--text);text-decoration:none;font-size:15px;font-weight:700;padding:9px 10px;border:1px solid var(--line);border-radius:6px;background:var(--soft);transition:.15s}
  .index-list a::after{content:">";color:var(--orange);font-weight:900;text-align:right}
  .index-list a:hover{color:var(--orange);border-color:var(--orange);background:#fff;transform:translateX(2px)}
  .num{font-family:"Montserrat",sans-serif;color:var(--orange);font-size:14px;font-weight:900}
  @media (max-width:820px){.page{padding:16px;overflow:auto}.cover{width:100%;min-height:100%;height:auto;padding:28px}.main{grid-template-columns:1fr;gap:36px}}
</style>
</head>
<body>
<main class="page">
  <section class="cover">
    <img class="logo" src="../../reports-shared/assets/logo-oat-white.png" alt="Logo" data-cfg-logo>
    <div class="main">
      <div class="left">
        <p class="eyebrow">SEO Strategy Report</p>
        <h1 class="cover-h">SEO<br>REPORT</h1>
        <div class="rule"></div>
        <p class="client" data-cfg="client_name">Client</p>
        <p class="date" data-cfg="report_date">—</p>
      </div>
      <nav class="index-card" aria-label="Report contents">
        <h2 class="index-title">Report Contents</h2>
        <ol class="index-list" id="rpt-toc"></ol>
      </nav>
    </div>
  </section>
</main>

<script src="../../reports-shared/components/_pages.js"></script>
<script src="../../reports-shared/assets/config-loader.js"></script>
<script>
  // Apply per-client config to logo + name + date.
  window.REPORT_CONFIG_READY.then(cfg => {
    if (cfg.logo) document.querySelectorAll('[data-cfg-logo]').forEach(el => el.src = cfg.logo);
    document.querySelectorAll('[data-cfg]').forEach(el => {
      const key = el.dataset.cfg;
      if (cfg[key]) el.textContent = cfg[key];
    });
    if (cfg.primary_color) document.documentElement.style.setProperty('--orange', cfg.primary_color);
  });
  // Build the table-of-contents from REPORT_PAGES.
  const toc = document.getElementById('rpt-toc');
  toc.innerHTML = window.REPORT_PAGES
    .filter(p => p.id !== 'index')
    .map(p => `<li><a href="${p.href}"><span class="num">${p.num}</span><span>${p.label}</span></a></li>`)
    .join('');
</script>
</body>
</html>
